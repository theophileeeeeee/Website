<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erreur — Message non envoyé</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #000000;
      --muted: #666666;
      --line: #000000;
      --accent: #ff3300;
      --shadow: 8px 8px 0px var(--line);
    }

    html[data-theme="dark"] {
      --bg: #000000;
      --surface: #000000;
      --text: #ffffff;
      --muted: #999999;
      --line: #ffffff;
      --accent: #ccff00;
      --shadow: 8px 8px 0px var(--line);
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .box {
      background: var(--surface);
      padding: 60px 40px;
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 450px;
      width: 90%;
    }

    h1 {
      margin: 0 0 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      text-transform: uppercase;
      color: var(--accent);
    }

    p {
      margin-bottom: 40px;
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .btn-back {
      display: inline-block;
      padding: 16px 32px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--line);
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      box-shadow: 4px 4px 0px var(--line);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-back:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--line);
    }

    .btn-back:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--line);
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>ERREUR ❌</h1>
    <p>Le message n'a pas pu être transmis au serveur.<br>Veuillez réessayer ultérieurement.</p>
    <a class="btn-back" href="index.html#contact">RETOUR AU SITE</a>
  </div>

  <script>
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    root.setAttribute('data-theme', savedTheme);
  </script>
</body>
</html>
